# CareBridge — Continuous Integration & Delivery
# Builds frontend, runs backend integration tests, builds Docker images,
# and publishes to GHCR on main/lifei (when packages:write is available).

name: CI

on:
  push:
    branches: [main, master, lifei]
    paths:
      - 'dell/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main, master, lifei]
    paths:
      - 'dell/**'
      - '.github/workflows/ci.yml'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: dell

jobs:
  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: dell/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build SPA
        run: npm run build

  backend-integration:
    name: Backend integration test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dell/backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: dell/backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run isolated integration test
        run: npm run test:integration

  docker-build:
    name: Docker images
    runs-on: ubuntu-latest
    needs: [frontend, backend-integration]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build backend and web images
        run: docker compose build carebridge-api carebridge-web

  publish:
    name: Publish to GHCR
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/lifei')
    permissions:
      contents: read
      packages: write
    defaults:
      run:
        working-directory: dell
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push images
        env:
          IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/carebridge
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f Dockerfile.backend -t "${IMAGE_PREFIX}-backend:${IMAGE_TAG}" -t "${IMAGE_PREFIX}-backend:latest" .
          docker build -f Dockerfile -t "${IMAGE_PREFIX}-web:${IMAGE_TAG}" -t "${IMAGE_PREFIX}-web:latest" .
          docker push "${IMAGE_PREFIX}-backend:${IMAGE_TAG}"
          docker push "${IMAGE_PREFIX}-backend:latest"
          docker push "${IMAGE_PREFIX}-web:${IMAGE_TAG}"
          docker push "${IMAGE_PREFIX}-web:latest"
