apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: carebridge-default-deny-ingress
  namespace: carebridge
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: carebridge-web-ingress
  namespace: carebridge
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: web
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          port: 8080
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: carebridge-gateway-ingress
  namespace: carebridge
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: gateway
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: web
      ports:
        - protocol: TCP
          port: 3001
    - ports:
        - protocol: TCP
          port: 3001
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: carebridge-microservices-internal
  namespace: carebridge
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: carebridge
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: carebridge
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: gateway
