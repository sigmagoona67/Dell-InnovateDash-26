apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../

# CD workflow runs: kustomize edit set image ... before apply
images:
  - name: carebridge-backend
    newName: ghcr.io/REPLACE_OWNER/carebridge-backend
    newTag: latest
  - name: carebridge-ai
    newName: ghcr.io/REPLACE_OWNER/carebridge-web
    newTag: latest

patches:
  - target:
      kind: Deployment
      labelSelector: app.kubernetes.io/name=carebridge
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Always
