apiVersion: v1
kind: Service
metadata:
  name: carebridge-web-lb
  namespace: carebridge
  labels:
    app.kubernetes.io/name: carebridge
    app.kubernetes.io/component: web
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: carebridge
    app.kubernetes.io/component: web
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
