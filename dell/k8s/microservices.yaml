apiVersion: apps/v1
kind: Deployment
metadata:
  name: carebridge-gateway
  namespace: carebridge
  labels:
    app.kubernetes.io/name: carebridge
    app.kubernetes.io/component: gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: carebridge
      app.kubernetes.io/component: gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: carebridge
        app.kubernetes.io/component: gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3001"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: gateway
          image: carebridge-backend:local
          imagePullPolicy: IfNotPresent
          command: ["node", "gateway/server.js"]
          ports:
            - name: http
              containerPort: 3001
          envFrom:
            - secretRef:
                name: carebridge-backend-secrets
            - configMapRef:
                name: carebridge-config
          env:
            - name: AUTH_SERVICE_HOST
              value: carebridge-auth
            - name: PROFILE_SERVICE_HOST
              value: carebridge-profile
            - name: ONBOARDING_SERVICE_HOST
              value: carebridge-onboarding
            - name: CASE_SERVICE_HOST
              value: carebridge-case
            - name: REASSIGNMENT_SERVICE_HOST
              value: carebridge-reassignment
            - name: TEAM_SERVICE_HOST
              value: carebridge-team
            - name: AI_CHAT_SERVICE_HOST
              value: carebridge-ai-chat
            - name: AI_INSIGHTS_SERVICE_HOST
              value: carebridge-ai-insights
            - name: OFFLINE_SERVICE_HOST
              value: carebridge-offline
            - name: OFFLINE_SUMMARY_SERVICE_HOST
              value: carebridge-offline-summary
            - name: SCHEDULING_SERVICE_HOST
              value: carebridge-scheduling
            - name: STAFF_EDIT_SERVICE_HOST
              value: carebridge-staff-edit
            - name: STORAGE_SERVICE_HOST
              value: carebridge-storage
            - name: NOTIFICATION_SERVICE_HOST
              value: carebridge-notification
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: carebridge-config
                  key: REDIS_URL
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 8
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: carebridge-gateway
  namespace: carebridge
  labels:
    app.kubernetes.io/name: carebridge
    app.kubernetes.io/component: gateway
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: carebridge
    app.kubernetes.io/component: gateway
  ports:
    - name: http
      port: 3001
      targetPort: http
---
