apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: carebridge
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        editable: false
      - name: Loki
        type: loki
        access: proxy
        url: http://loki:3100
        editable: false
      - name: Jaeger
        type: jaeger
        access: proxy
        url: http://jaeger:16686
        editable: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-provider
  namespace: carebridge
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: carebridge
        orgId: 1
        folder: CareBridge
        type: file
        disableDeletion: true
        editable: false
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-carebridge
  namespace: carebridge
data:
  carebridge-overview.json: |
    {
      "title": "CareBridge Overview",
      "uid": "carebridge-overview",
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "30s",
      "tags": ["carebridge", "cloud-native"],
      "panels": [
        {
          "id": 1,
          "title": "HTTP request rate (req/s)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "targets": [
            {
              "expr": "sum(rate(carebridge_http_requests_total[5m])) by (service)",
              "legendFormat": "{{service}}"
            }
          ]
        },
        {
          "id": 2,
          "title": "P95 latency (seconds)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(carebridge_http_request_duration_seconds_bucket[5m])) by (le, service))",
              "legendFormat": "{{service}}"
            }
          ]
        },
        {
          "id": 3,
          "title": "5xx error rate",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "targets": [
            {
              "expr": "sum(rate(carebridge_http_requests_total{status=~\"5..\"}[5m])) by (service)",
              "legendFormat": "{{service}}"
            }
          ]
        },
        {
          "id": 4,
          "title": "Scraped targets up",
          "type": "stat",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "targets": [
            {
              "expr": "count(up{job=\"carebridge-kubernetes-pods\"} == 1)",
              "legendFormat": "up"
            }
          ]
        }
      ]
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: carebridge
  labels:
    app.kubernetes.io/name: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.2.0
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: admin
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: carebridge-backend-secrets
                  key: GRAFANA_ADMIN_PASSWORD
                  optional: true
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: Viewer
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboards-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboards-provider
          configMap:
            name: grafana-dashboards-provider
        - name: dashboards
          configMap:
            name: grafana-dashboard-carebridge
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: carebridge
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: grafana
  ports:
    - name: http
      port: 3000
      targetPort: http
