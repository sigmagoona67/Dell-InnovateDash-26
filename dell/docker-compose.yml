services:
  carebridge-web:
    build:
      context: .
      dockerfile: Dockerfile
    image: carebridge-ai:local
    container_name: carebridge-web
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      VITE_INSFORGE_URL: ${VITE_INSFORGE_URL:?Set VITE_INSFORGE_URL in .env or environment}
      VITE_INSFORGE_ANON_KEY: ${VITE_INSFORGE_ANON_KEY:?Set VITE_INSFORGE_ANON_KEY in .env or environment}
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:8080/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 64M
