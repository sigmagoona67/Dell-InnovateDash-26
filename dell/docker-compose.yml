services:
  postgres:
    image: postgres:16-alpine
    container_name: carebridge-postgres
    environment:
      POSTGRES_USER: carebridge
      POSTGRES_PASSWORD: carebridge
      POSTGRES_DB: carebridge
    ports:
      - '5432:5432'
    volumes:
      - carebridge_pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U carebridge -d carebridge']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: carebridge-redis
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  carebridge-api:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: carebridge-backend:local
    container_name: carebridge-api
    env_file:
      - path: .env.local
        required: false
      - path: .env
        required: false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - '${APP_API_PORT:-3001}:3001'
    environment:
      DATABASE_URL: postgresql://carebridge:carebridge@postgres:5432/carebridge
      REDIS_URL: redis://redis:6379
      CAREBRIDGE_API_URL: http://carebridge-api:3001
      BIND_HOST: 0.0.0.0
    command: ['node', 'scripts/start-all.mjs']
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:3001/health']
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 30s

  carebridge-web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:${APP_API_PORT:-3001}
    image: carebridge-ai:local
    container_name: carebridge-web
    depends_on:
      carebridge-api:
        condition: service_healthy
    ports:
      - '${APP_PORT:-8080}:8080'
    environment:
      VITE_API_URL: http://localhost:${APP_API_PORT:-3001}
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:8080/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

volumes:
  carebridge_pg:
